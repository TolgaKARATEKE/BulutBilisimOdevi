
services:
  postgres:
    image: postgres:15-alpine
    container_name: rplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rplace
      POSTGRES_USER:     rplace_user
      POSTGRES_PASSWORD: R_place_S3cur3!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rplace_user -d rplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rplace-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:          3001
      CANVAS_SIZE:   100
      COOLDOWN_MS:   5000
      APP_VERSION:   "1.0.0-dev"
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       rplace
      DB_USER:       rplace_user
      DB_PASSWORD:   R_place_S3cur3!
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rplace-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_HOST: backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
